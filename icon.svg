<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Page body with folded top-right corner -->
  <polygon
    points="3,1 20,1 29,10 29,31 3,31"
    fill="#e8dac4"
    stroke="#1c2e5e"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <!-- Fold flap (darker cream) -->
  <polygon
    points="20,1 29,10 20,10"
    fill="#cfc0a4"
    stroke="#1c2e5e"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <!-- Red classification bar near top -->
  <rect x="3" y="4.5" width="17" height="2" fill="#c0253a"/>
  <!-- Text lines -->
  <line x1="6" y1="15" x2="25" y2="15" stroke="#1c2e5e" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="6" y1="20" x2="25" y2="20" stroke="#1c2e5e" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="6" y1="25" x2="17" y2="25" stroke="#1c2e5e" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
